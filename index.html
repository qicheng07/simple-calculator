<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="简易计算器 - 日常生活快速计算工具">
    <title>简易计算器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="calculator" role="application" aria-label="简易计算器">
        <!-- 显示区域 -->
        <section class="display" aria-live="polite">
            <div class="expression" id="expression" aria-label="表达式"></div>
            <div class="result" id="result" aria-label="结果">0</div>
        </section>

        <!-- 按钮区域 -->
        <section class="buttons" role="group" aria-label="计算器按钮">
            <!-- 第一行：功能按钮 -->
            <button type="button" class="btn btn-function" id="btn-ac" aria-label="全部清除">AC</button>
            <button type="button" class="btn btn-function" id="btn-del" aria-label="退格删除">DEL</button>
            <button type="button" class="btn btn-function" id="btn-percent" aria-label="百分比">%</button>
            <button type="button" class="btn btn-operator" id="btn-divide" aria-label="除法">÷</button>

            <!-- 第二行：7 8 9 × -->
            <button type="button" class="btn btn-number" id="btn-7" aria-label="7">7</button>
            <button type="button" class="btn btn-number" id="btn-8" aria-label="8">8</button>
            <button type="button" class="btn btn-number" id="btn-9" aria-label="9">9</button>
            <button type="button" class="btn btn-operator" id="btn-multiply" aria-label="乘法">×</button>

            <!-- 第三行：4 5 6 - -->
            <button type="button" class="btn btn-number" id="btn-4" aria-label="4">4</button>
            <button type="button" class="btn btn-number" id="btn-5" aria-label="5">5</button>
            <button type="button" class="btn btn-number" id="btn-6" aria-label="6">6</button>
            <button type="button" class="btn btn-operator" id="btn-subtract" aria-label="减法">-</button>

            <!-- 第四行：1 2 3 + -->
            <button type="button" class="btn btn-number" id="btn-1" aria-label="1">1</button>
            <button type="button" class="btn btn-number" id="btn-2" aria-label="2">2</button>
            <button type="button" class="btn btn-number" id="btn-3" aria-label="3">3</button>
            <button type="button" class="btn btn-operator" id="btn-add" aria-label="加法">+</button>

            <!-- 第五行：± 0 . = -->
            <button type="button" class="btn btn-function" id="btn-sign" aria-label="正负切换">±</button>
            <button type="button" class="btn btn-number" id="btn-0" aria-label="0">0</button>
            <button type="button" class="btn btn-number" id="btn-decimal" aria-label="小数点">.</button>
            <button type="button" class="btn btn-operator btn-equals" id="btn-equals" aria-label="等于">=</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
